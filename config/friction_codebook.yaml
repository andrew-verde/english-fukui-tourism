# Friction Codebook — Focused Friction Analysis
#
# Each code has a label, type (friction or nudge), and a keyword list.
# Keywords use word-boundary matching (case-insensitive).
# Multi-word phrases are supported (e.g. "far from").
# Edit this file freely — it is the only source of truth for code tagging.
#
# Design principle: precision over recall.
# False positives (positive text tagged as friction) are more damaging
# than missed friction mentions in a small-sample exploratory analysis.
#
# Types:
#   friction — points of difficulty or unmet expectation
#   nudge    — positive signals, promotional opportunities, or easy-win gaps

