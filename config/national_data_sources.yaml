    filename: "jta_accommodation_2020_confirmed.xlsx"
    description: "宿泊旅行統計調査 2020 Jan–Dec confirmed values — COVID regime"
  jta_accommodation_2021_confirmed:
    url: "https://www.mlit.go.jp/kankocho/tokei_hakusyo/content/001488438.xlsx"
    filename: "jta_accommodation_2021_confirmed.xlsx"
    description: "宿泊旅行統計調査 2021 Jan–Dec confirmed values — COVID regime"
  jta_accommodation_2022_confirmed:
    url: "https://www.mlit.go.jp/kankocho/tokei_hakusyo/content/001616676.xlsx"
    filename: "jta_accommodation_2022_confirmed.xlsx"
    description: "宿泊旅行統計調査 2022 Jan–Dec confirmed values (年の確定値)"
  jta_accommodation_2023_confirmed:
