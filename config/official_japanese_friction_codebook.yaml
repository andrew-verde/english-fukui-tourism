# Japanese FTAS friction codebook.
#
# Codes intentionally mirror config/friction_codebook.yaml so shared labels
# remain consistent across official survey outputs.
# Keyword matching is substring-based, not word-boundary-based.

friction_codes:

  transport_access:
    label: "Transport / Access"
    type: friction
    keywords:
      - アクセスが悪
      - 交通の便が悪
      - 交通が不便
      - 公共交通
      - バスが少な
      - バスの本数
      - 電車が少な
      - 便が少な
      - 本数が少な
      - 乗り継ぎ
      - 遠い
      - 行きにく
      - 車がない
      - 車でないと
      - 駅から遠
      - 移動が大変
      - タクシーが少な
      - タクシーがつかまら
      - タクシー待ち

  wayfinding_signage:
    label: "Wayfinding / Signage"
    type: friction
    keywords:
      - 案内がわかりにく
      - 案内表示
      - 表示がわかりにく
      - 看板
      - 標識
      - 道案内
      - 道がわかりにく
      - 迷った
      - 場所がわかりにく
      - 入口がわかりにく
      - 地図

  language_information_gap:
    label: "Language Information Gap"
    type: friction
    keywords:
      - 英語
      - 外国語
      - 多言語
      - 翻訳
      - インバウンド
      - 外国人向け
      - 外国人対応

  staff_communication:
    label: "Staff Communication"
    type: friction
    keywords:
      - 接客が悪
      - 接客に不満
      - 対応が悪
      - スタッフの対応
      - 店員の対応
      - 職員の対応
      - 説明不足
      - 不親切
      - 態度が悪
      - 案内不足

  booking_ticketing:
    label: "Booking / Ticketing"
    type: friction
    keywords:
      - 予約でき
      - 予約が取れ
      - 予約が必要
      - チケットが買え
      - 入場券が買え
      - 売り切れ
      - 満席
      - 事前予約
      - 現金のみ
      - キャッシュレス未対応
      - クレジットが使え
      - 支払いが不便
      - 決済が不便

  waiting_crowding:
    label: "Waiting / Crowding"
    type: friction
    keywords:
      - 混雑
      - 混んで
      - 人が多
      - 行列
      - 待ち時間
      - 待った
      - 並ん
      - 渋滞
      - 駐車場待ち
      - 長蛇

  price_value:
    label: "Price / Value"
    type: friction
    keywords:
      - 料金が高
      - 値段が高
      - 価格が高
      - 割高
      - コスパが悪
      - 入場料が高
      - 駐車料金が高
      - 有料なの
      - 費用が高

  cleanliness_comfort:
    label: "Cleanliness / Comfort"
    type: friction
